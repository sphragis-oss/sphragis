version: 2
project_name: sphragis

before:
  hooks:
    - go mod tidy

builds:
  - id: sphragis
    main: ./cmd/sphragis
    binary: sphragis
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

dockers:
  - id: amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    image_templates:
      - "ghcr.io/sphragis-oss/sphragis:{{ .Version }}-amd64"
      - "ghcr.io/sphragis-oss/sphragis:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=EU AI Act compliance gateway: local PII redaction and a tamper-evident audit log"
      - "--label=org.opencontainers.image.url=https://sphragis.eu"
      - "--label=org.opencontainers.image.source=https://github.com/sphragis-oss/sphragis"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
  - id: arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    image_templates:
      - "ghcr.io/sphragis-oss/sphragis:{{ .Version }}-arm64"
      - "ghcr.io/sphragis-oss/sphragis:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=EU AI Act compliance gateway: local PII redaction and a tamper-evident audit log"
      - "--label=org.opencontainers.image.url=https://sphragis.eu"
      - "--label=org.opencontainers.image.source=https://github.com/sphragis-oss/sphragis"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

docker_manifests:
  - name_template: "ghcr.io/sphragis-oss/sphragis:{{ .Version }}"
    image_templates:
      - "ghcr.io/sphragis-oss/sphragis:{{ .Version }}-amd64"
      - "ghcr.io/sphragis-oss/sphragis:{{ .Version }}-arm64"
  - name_template: "ghcr.io/sphragis-oss/sphragis:latest"
    image_templates:
      - "ghcr.io/sphragis-oss/sphragis:latest-amd64"
      - "ghcr.io/sphragis-oss/sphragis:latest-arm64"

checksum:
  name_template: checksums.txt

sboms:
  - id: archive
    artifacts: archive

# keyless (OIDC) cosign signing; needs cosign on PATH and id-token: write in CI.
# cosign v2+ emits a single bundle (signature + certificate); verify with --bundle.
signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    signature: "${artifact}.bundle"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"

docker_signs:
  - cmd: cosign
    artifacts: all
    output: true
    args:
      - sign
      - "${artifact}@${digest}"
      - "--yes"

homebrew_casks:
  - name: sphragis
    binaries:
      - sphragis
    repository:
      owner: sphragis-oss
      name: homebrew-sphragis
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://sphragis.eu
    description: "EU AI Act compliance gateway: local PII redaction and a tamper-evident audit log"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/sphragis"]
          end

release:
  github:
    owner: sphragis-oss
    name: sphragis
